configure terminal
hostname CE4
!
interface GigabitEthernet1/0
 description WAN to PE2
 ip address 172.16.0.14 255.255.255.252
 no shutdown
!
interface GigabitEthernet2/0
 description CUST2 LAN
 ip address 192.168.21.1 255.255.255.0
 no shutdown
!
router bgp 65202
 bgp router-id 192.168.21.1
 neighbor 172.16.0.13 remote-as 65000
 address-family ipv4
  neighbor 172.16.0.13 activate
  network 192.168.21.0 mask 255.255.255.0
 exit-address-family
!
end
write memory
