configure terminal
hostname PE2
!
ip vrf CUST1
 rd 65000:1
 route-target import 65000:1
 route-target export 65000:1
!
ip vrf CUST2
 rd 65000:2
 route-target import 65000:2
 route-target export 65000:2
!
interface GigabitEthernet2/0
 description CUST1 to CE2
 ip vrf forwarding CUST1
 ip address 172.16.0.5 255.255.255.252
 no shutdown
!
interface GigabitEthernet3/0
 description CUST2 to CE4
 ip vrf forwarding CUST2
 ip address 172.16.0.13 255.255.255.252
 no shutdown
!
router bgp 65000
 address-family ipv4 vrf CUST1
  neighbor 172.16.0.6 remote-as 65102
  neighbor 172.16.0.6 activate
  neighbor 172.16.0.6 send-community both
 exit-address-family
 address-family ipv4 vrf CUST2
  neighbor 172.16.0.14 remote-as 65202
  neighbor 172.16.0.14 activate
  neighbor 172.16.0.14 send-community both
 exit-address-family
!
end
write memory
