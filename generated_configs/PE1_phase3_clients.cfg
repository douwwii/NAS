configure terminal
hostname PE1
!
ip vrf CUST1
 rd 65000:1
 route-target import 65000:1
 route-target export 65000:1
!
ip vrf CUST2
 rd 65000:2
 route-target import 65000:2
 route-target export 65000:2
!
interface GigabitEthernet2/0
 description CUST1 to CE1
 ip vrf forwarding CUST1
 ip address 172.16.0.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet3/0
 description CUST2 to CE3
 ip vrf forwarding CUST2
 ip address 172.16.0.9 255.255.255.252
 no shutdown
!
router bgp 65000
 address-family ipv4 vrf CUST1
  neighbor 172.16.0.2 remote-as 65101
  neighbor 172.16.0.2 activate
  neighbor 172.16.0.2 send-community both
 exit-address-family
 address-family ipv4 vrf CUST2
  neighbor 172.16.0.10 remote-as 65201
  neighbor 172.16.0.10 activate
  neighbor 172.16.0.10 send-community both
 exit-address-family
!
end
write memory
