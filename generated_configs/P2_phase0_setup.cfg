configure terminal
hostname P2
!
interface Loopback0
 description Router-ID 10.255.255.9
 ip address 10.255.255.9 255.255.255.252
 no shutdown
!
interface GigabitEthernet1/0
 description CORE to P1
 ip address 10.0.0.6 255.255.255.252
 no shutdown
!
interface GigabitEthernet2/0
 description CORE to PE2
 ip address 10.0.0.9 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 10.255.255.9
 passive-interface Loopback0
 network 10.255.255.9 0.0.0.0 area 0
 no passive-interface GigabitEthernet1/0
 network 10.0.0.4 0.0.0.3 area 0
 no passive-interface GigabitEthernet2/0
 network 10.0.0.8 0.0.0.3 area 0
!
end
write memory
