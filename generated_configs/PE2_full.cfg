configure terminal
hostname PE2
!
interface Loopback0
 description Router-ID 4.4.4.4
 ip address 1.1.1.4 255.255.255.255
 no shutdown
!
interface GigabitEthernet1/0
 description CORE to P2
 ip address 10.0.0.10 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 4.4.4.4
 passive-interface Loopback0
 network 1.1.1.4 0.0.0.0 area 0
 no passive-interface GigabitEthernet1/0
 network 10.0.0.8 0.0.0.3 area 0
!
ip cef
mpls label protocol ldp
mpls ldp router-id Loopback0 force
!
interface GigabitEthernet1/0
 mpls ip
!
router bgp 65000
 bgp router-id 4.4.4.4
 no bgp default ipv4-unicast
 neighbor 1.1.1.1 remote-as 65000
 neighbor 1.1.1.1 update-source Loopback0
 address-family vpnv4
  neighbor 1.1.1.1 activate
  neighbor 1.1.1.1 send-community both
 exit-address-family
!
ip vrf CUST1
 rd 65000:1
 route-target import 65000:1
 route-target export 65000:1
!
ip vrf CUST2
 rd 65000:2
 route-target import 65000:2
 route-target export 65000:2
!
interface GigabitEthernet2/0
 description CUST1 to CE2
 ip vrf forwarding CUST1
 ip address 172.16.0.5 255.255.255.252
 no shutdown
!
interface GigabitEthernet3/0
 description CUST2 to CE4
 ip vrf forwarding CUST2
 ip address 172.16.0.13 255.255.255.252
 no shutdown
!
router bgp 65000
 address-family ipv4 vrf CUST1
  neighbor 172.16.0.6 remote-as 65102
  neighbor 172.16.0.6 activate
  neighbor 172.16.0.6 send-community both
 exit-address-family
 address-family ipv4 vrf CUST2
  neighbor 172.16.0.14 remote-as 65202
  neighbor 172.16.0.14 activate
  neighbor 172.16.0.14 send-community both
 exit-address-family
!
end
write memory
