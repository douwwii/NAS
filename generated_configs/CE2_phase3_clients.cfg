configure terminal
hostname CE2
!
interface GigabitEthernet1/0
 description WAN to PE2
 ip address 172.16.0.6 255.255.255.252
 no shutdown
!
interface GigabitEthernet2/0
 description CUST2 LAN
 ip address 192.168.19.1 255.255.255.0
 no shutdown
!
interface Loopback0
 description Customer Loopback
 ip address 10.255.254.2 255.255.255.255
 no shutdown
!
router bgp 65200
 bgp router-id 10.255.254.2
 neighbor 172.16.0.5 remote-as 65000
 address-family ipv4
  neighbor 172.16.0.5 activate
  network 192.168.19.0 mask 255.255.255.0
  network 10.255.254.2 mask 255.255.255.255
 exit-address-family
!
end
write memory
