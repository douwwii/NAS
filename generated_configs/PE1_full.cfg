configure terminal
hostname PE1
!
interface Loopback0
 description Router-ID 1.1.1.1
 ip address 1.1.1.1 255.255.255.255
 no shutdown
!
interface GigabitEthernet1/0
 description CORE to P1
 ip address 10.0.0.1 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 1.1.1.1
 passive-interface Loopback0
 network 1.1.1.1 0.0.0.0 area 0
 no passive-interface GigabitEthernet1/0
 network 10.0.0.0 0.0.0.3 area 0
!
ip cef
mpls label protocol ldp
mpls ldp router-id Loopback0 force
!
interface GigabitEthernet1/0
 mpls ip
!
router bgp 65000
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 neighbor 1.1.1.4 remote-as 65000
 neighbor 1.1.1.4 update-source Loopback0
 address-family vpnv4
  neighbor 1.1.1.4 activate
  neighbor 1.1.1.4 send-community both
 exit-address-family
!
ip vrf CUST1
 rd 65000:1
 route-target import 65000:1
 route-target export 65000:1
!
ip vrf CUST2
 rd 65000:2
 route-target import 65000:2
 route-target export 65000:2
!
interface GigabitEthernet2/0
 description CUST1 to CE1
 ip vrf forwarding CUST1
 ip address 172.16.0.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet3/0
 description CUST2 to CE3
 ip vrf forwarding CUST2
 ip address 172.16.0.9 255.255.255.252
 no shutdown
!
router bgp 65000
 address-family ipv4 vrf CUST1
  neighbor 172.16.0.2 remote-as 65101
  neighbor 172.16.0.2 activate
  neighbor 172.16.0.2 send-community both
  network 172.16.0.0 mask 255.255.255.252
 exit-address-family
 address-family ipv4 vrf CUST2
  neighbor 172.16.0.10 remote-as 65201
  neighbor 172.16.0.10 activate
  neighbor 172.16.0.10 send-community both
  network 172.16.0.8 mask 255.255.255.252
 exit-address-family
!
end
write memory
